<!DOCTYPE html>
<html>
<head>
    <title>Student Page</title>
</head>
<body>

<h1>Student Interface</h1>

<!-- Student Selection -->
<label>Select Student:</label>
<select id="student_id">
    <option value="12345">Student 12345</option>
    <option value="67890">Student 67890</option>
</select>

<br><br>

<!-- Type Selection -->
<label>Select Type:</label>
<select id="type">
    <option value="lec">Lecture</option>
    <option value="tut">Tutorial</option>
</select>

<br><br>

<!-- Topic Selection (dynamic) -->
<label>Select Topic:</label>
<select id="selection"></select>

<br><br>

<!-- Question Input -->
<textarea id="question" rows="4" cols="50" placeholder="Ask your question here..."></textarea>

<br><br>

<!-- Submit Button -->
<button onclick="submitQuestion()">Ask</button>

<br>
<button onclick="viewStruggles()">View My Struggles</button>

<br>

<!-- Status -->
<h4 id="status">Status: Idle</h4>

<!-- Output -->
<h3>Response:</h3>
<div id="response"></div>

<h3>My Struggles:</h3>
<div id="struggles"></div>

<script>
const data = {
    lec: ["lec1", "lec2", "lec3"],
    tut: ["tut1", "tut2", "tut3"]
};

function updateSelection() {
    const type = document.getElementById("type").value;
    const selection = document.getElementById("selection");

    selection.innerHTML = "";

    data[type].forEach(item => {
        const option = document.createElement("option");
        option.value = item;
        option.textContent = item.toUpperCase();
        selection.appendChild(option);
    });
}

document.getElementById("type").addEventListener("change", updateSelection);
window.onload = updateSelection;

async function submitQuestion() {
    const student_id = document.getElementById("student_id").value;
    const type = document.getElementById("type").value;
    const selection = document.getElementById("selection").value;
    const question = document.getElementById("question").value;

    document.getElementById("status").innerText =
        "Status: Sending prompt to server...";

    document.getElementById("response").innerText = "";

    try {
        const res = await fetch("/submit", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                student_id: student_id,
                type: type,
                selection: selection,
                question: question
            })
        });

        document.getElementById("status").innerText =
            "Status: Generating response...";

        const data = await res.json();

        document.getElementById("status").innerText =
            "Status: Done";

        document.getElementById("response").innerText =
            data.answer;

    } catch (err) {
        document.getElementById("status").innerText =
            "Status: Error";
    }
}

async function viewStruggles() {
    const student_id = document.getElementById("student_id").value;

    document.getElementById("status").innerText =
        "Status: Fetching struggles...";

    document.getElementById("struggles").innerHTML = "";

    try {
        const res = await fetch(`/view_struggles?student_id=${student_id}`);
        const data = await res.json();

        document.getElementById("status").innerText =
            "Status: Loaded struggles";

        const container = document.getElementById("struggles");

        const struggles = data.struggles;

        for (const pair in struggles) {
            const section = document.createElement("div");

            // Title
            const title = document.createElement("h4");
            title.innerText = pair.replace("_", " + ").toUpperCase();
            section.appendChild(title);

            if (struggles[pair].length === 0) {
                const empty = document.createElement("p");
                empty.innerText = "No struggles recorded.";
                section.appendChild(empty);
            } else {
                const ul = document.createElement("ul");

                // Sort: lec first, then tut
                const sorted = struggles[pair].slice().sort((a, b) => {
                    if (a.type === b.type) return 0;
                    return a.type === "lec" ? -1 : 1;
                });

                sorted.forEach(item => {
                    const li = document.createElement("li");
                    li.innerText = `[${item.type.toUpperCase()}] ${item.content}`;
                    ul.appendChild(li);
                });

                section.appendChild(ul);
            }

            container.appendChild(section);
        }

    } catch (err) {
        document.getElementById("status").innerText =
            "Status: Error fetching struggles";
    }
}

</script>

</body>
</html>
