<!DOCTYPE html>
<html>
<head>
    <title>Student Page</title>
</head>
<body>

<h1>Student Interface</h1>

<!-- Student Selection -->
<label>Select Student:</label>
<select id="student_id">
    <option value="12345">Student 12345</option>
    <option value="67890">Student 67890</option>
</select>

<br><br>

<!-- Lecture/Tutorial Selection -->
<label>Select Lecture/Tutorial:</label>
<select id="pair">
    <option value="lec1_tut1">Lec1 / Tut1</option>
    <option value="lec2_tut2">Lec2 / Tut2</option>
    <option value="lec3_tut3">Lec3 / Tut3</option>
</select>

<br><br>

<!-- Question Input -->
<textarea id="question" rows="4" cols="50" placeholder="Ask your question here..."></textarea>

<br><br>

<!-- Submit Button -->
<button onclick="submitQuestion()">Ask</button>


<!-- Status -->
<h4 id="status">Status: Idle</h4>

<!-- Output -->
<h3>Response:</h3>
<div id="response"></div>

<script>
async function submitQuestion() {
    const student_id = document.getElementById("student_id").value;
    const pair = document.getElementById("pair").value;
    const question = document.getElementById("question").value;

    document.getElementById("status").innerText =
        "Status: Sending prompt to server...";

    document.getElementById("response").innerText = "";

    try {
        const res = await fetch("/submit", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                student_id: student_id,
                pair: pair,
                question: question
            })
        });

        document.getElementById("status").innerText =
            "Status: Generating response...";

        const data = await res.json();

        document.getElementById("status").innerText =
            "Status: Done";

        document.getElementById("response").innerText =
            data.answer;

    } catch (err) {
        document.getElementById("status").innerText =
            "Status: Error";
    }
}
</script>

</body>
</html>
